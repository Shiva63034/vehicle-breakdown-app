# JWT
app.jwt.secret=${JWT_SECRET:breakdownsecretkeybreakdownsecretkey12345}
app.jwt.expiration=${JWT_EXPIRATION:2592000000}

# AWS
aws.s3.region=${AWS_REGION:ap-south-1}
aws.s3.bucket-name=${AWS_BUCKET_NAME:breakdown-assistance}
aws.s3.access-key=${AWS_ACCESS_KEY:dummy}
aws.s3.secret-key=${AWS_SECRET_KEY:dummy}

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:dummy}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:dummy}

# Mail
spring.mail.username=${MAIL_USERNAME:yourmail@gmail.com}
spring.mail.password=${MAIL_PASSWORD:dummy}

# DB
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/breakdown_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:YourPassword123}